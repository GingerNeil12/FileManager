name: Backend CI

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - main

permissions:
  checks: write
  contents: read

env:
  DOTNET_VERSION: '10.x'
  BUILD_CONFIG: Release
  SOLUTION_PATH: Backend/FileManager.slnx
  TEST_RESULTS_DIR: TestResults/

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ${{ env.BUILD_CONFIG }}

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-build --configuration ${{ env.BUILD_CONFIG }} --logger "trx" --results-directory ${{ env.TEST_RESULTS_DIR }}

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: ${{ env.TEST_RESULTS_DIR }}*.trx
          reporter: dotnet-trx
